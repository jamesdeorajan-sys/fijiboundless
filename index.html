<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>FijiBoundless — Accessible Fiji Travel</title>
  <meta name="description" content="The only verified accessibility guide to Fiji. Real-time access data, sensory-friendly ratings, and inclusive adventures across all islands." />
  <!-- Static OG/Twitter tags: this is a client-rendered SPA with no server-side
       rendering, and social crawlers (Facebook, WhatsApp, Twitter) generally
       don't execute JavaScript, so they only ever see these static tags —
       per-page tags set via the useSEO hook only affect the browser tab and
       JS-capable unfurlers. Update if/when a real og:image exists. -->
  <meta property="og:title" content="FijiBoundless — Accessible Fiji Travel" />
  <meta property="og:description" content="The only verified accessibility guide to Fiji. Real-time access data, sensory-friendly ratings, and inclusive adventures across all islands." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fijiboundless.pages.dev/" />
  <meta property="og:image" content="https://fijiboundless.pages.dev/favicon.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
