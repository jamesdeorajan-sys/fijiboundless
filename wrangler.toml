name = "fijiboundless"
pages_build_output_dir = "dist"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ───────────────────────────────────────────────────────────────
# After running `wrangler d1 create fijiboundless`, paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "fijiboundless"
database_id = "2071ab8c-f315-452e-92b3-547f1f1018e8"

# ── R2 Bucket (360° videos, accessibility photos) ────────────────────────────
# After running `wrangler r2 bucket create fijiboundless-media`, uncomment below.
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "fijiboundless-media"

# ── Environment variables ─────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

[env.preview]
[env.preview.vars]
ENVIRONMENT = "preview"
